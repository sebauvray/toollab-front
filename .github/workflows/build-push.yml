name: Build & push image

# Construit l'image de prod et la pousse sur GHCR, taguée avec la version sémantique.
# Déclenché en poussant un tag git de version, ex. :
#   git tag v1.4.0 && git push origin v1.4.0
# Produit : ghcr.io/sebauvray/toollab-front:1.4.0  (+ :1.4)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/sebauvray/toollab-front

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags d'image)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
